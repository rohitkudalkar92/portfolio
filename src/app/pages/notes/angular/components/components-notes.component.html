<app-layout>
  <app-back-nav backLink="/notes/angular" backText="Back to Angular" />
  <app-topic-header 
    title="Components" 
    description="Building blocks of Angular applications" 
  />

  <app-info-box title="Component Types" type="purple">
    <ul class="list-disc list-inside space-y-2">
      <li *ngFor="let type of types">{{ type }}</li>
    </ul>
  </app-info-box>

  <app-content-section title="Basic Component">
    <app-code-block [code]="basicExample.code" [output]="basicExample.output" />
  </app-content-section>

  <app-content-section title="Standalone Component">
    <app-code-block [code]="standaloneExample.code" [output]="standaloneExample.output" />
  </app-content-section>

  <app-content-section title="@Input - Receive Data">
    <app-code-block [code]="inputExample.code" [output]="inputExample.output" />
  </app-content-section>

  <app-content-section title="@Output - Emit Events">
    <app-code-block [code]="outputExample.code" [output]="outputExample.output" />
  </app-content-section>

  <app-content-section title="Lifecycle Hooks">
    <app-code-block [code]="lifecycleExample.code" [output]="lifecycleExample.output" />
  </app-content-section>

  <app-content-section title="@ViewChild - Access DOM">
    <app-code-block [code]="viewChildExample.code" [output]="viewChildExample.output" />
  </app-content-section>

  <app-content-section title="Smart/Container Component">
    <app-code-block [code]="smartComponentExample.code" [output]="smartComponentExample.output" />
  </app-content-section>

  <app-content-section title="Dumb/Presentational Component">
    <app-code-block [code]="dumbComponentExample.code" [output]="dumbComponentExample.output" />
  </app-content-section>

  <app-content-section title="Lazy-loaded Component">
    <app-code-block [code]="lazyComponentExample.code" [output]="lazyComponentExample.output" />
  </app-content-section>

  <app-content-section title="Dynamic Component">
    <app-code-block [code]="dynamicComponentExample.code" [output]="dynamicComponentExample.output" />
  </app-content-section>

  <app-info-box title="Component Decorators" type="info">
    <ul class="list-disc list-inside space-y-2">
      <li *ngFor="let decorator of decorators">{{ decorator }}</li>
    </ul>
  </app-info-box>

  <app-info-box title="Lifecycle Hooks" type="purple">
    <ul class="list-disc list-inside space-y-2">
      <li *ngFor="let hook of lifecycleHooks">{{ hook }}</li>
    </ul>
  </app-info-box>

  <app-info-box title="Best Practices" type="success">
    <ul class="list-disc list-inside space-y-2">
      <li *ngFor="let practice of bestPractices">{{ practice }}</li>
    </ul>
  </app-info-box>
</app-layout>
